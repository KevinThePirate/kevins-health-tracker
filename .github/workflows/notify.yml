name: Send Push Notifications

on:
  schedule:
    # Runs every 15 minutes — checks if any user's notification time falls in this window
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab for testing

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install script dependencies
        run: cd scripts && npm install

      - name: Send notifications
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: mailto:kevin@premio.ie
        run: node scripts/send-notifications.js
